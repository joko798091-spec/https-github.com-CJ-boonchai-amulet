<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amulets | BoonChai Amulet</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="store.css">
</head>

<body>
    <header class="store-header">
        <nav class="navbar" aria-label="Main navigation">
            <a class="brand" href="index.html" aria-label="BoonChai home">
                <img src="image/logo.png" alt="BoonChai logo">
                <span>BoonChai</span>
            </a>
            <button class="menu-button" type="button" aria-label="Open menu" onclick="showMenu()">Menu</button>
            <div class="navlinks" id="navlinks"></div>
        </nav>

        <section class="store-hero">
            <p class="eyebrow">Amulet Catalogue</p>
            <h1>Thai Amulets</h1>
            <p>Browse amulet listings with monk, temple, year, material, condition, image, and story details.</p>
        </section>
    </header>

    <main>
        <section class="category-tabs" aria-label="Catalogue categories">
            <a class="filter-chip is-active" href="store.html">Amulets</a>
            <a class="filter-chip" href="monks.html">Monks</a>
        </section>

        <section class="catalogue-search" aria-label="Search catalogue">
            <label for="catalogueSearch">Search all catalogue</label>
            <input id="catalogueSearch" type="search" placeholder="Type amulet or monk name">
            <div class="search-results" id="searchResults" aria-live="polite"></div>
        </section>

        <section class="product-grid" id="amuletGrid" aria-label="Amulet products"></section>
    </main>

    <footer class="footer">
        <p>BoonChai Amulet</p>
        <p>Amulet catalogue.</p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
